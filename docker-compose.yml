version: '3.8'

services:
  # Container do Lero Lero (Frontend + Backend unificados)
  lero-lero:
    build: .
    container_name: lero-lero-valfenda
    ports:
      - "3333:3333"
    environment:
      - API_PORT=3333
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:3b
    depends_on:
      - ollama
    restart: unless-stopped

  # Container do Ollama (IA Local)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # Descomente a seção abaixo se quiser ativar suporte a GPU NVIDIA no Docker.
    # OBS: Requer o NVIDIA Container Toolkit instalado no sistema operacional do host.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-data:
    name: lero-lero-ollama-data
